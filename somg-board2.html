<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMG — Board</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;
  --surface:#0f0f0f;
  --card:#141414;
  --border:#1e1e1e;
  --dim:#2a2a2a;
  --text:#f5f5f5;
  --muted:#4a4a4a;
  --accent:#f5e642;
  --todo:#f5f5f5;
  --working:#f5e642;
  --done:#2e2e2e;
  --done-text:#4a4a4a;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;overflow-x:hidden}

/* HEADER */
header{padding:2rem 2.5rem 0;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.logo img{height:44px;display:block;opacity:1}
.header-right{display:flex;align-items:center;gap:10px}
.add-artist-btn{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--dim);color:var(--muted);background:transparent;border-radius:3px;cursor:pointer;transition:all .15s}
.add-artist-btn:hover{border-color:var(--accent);color:var(--accent)}

/* TABS */
.tabs{display:flex;gap:0;padding:0 2.5rem;margin-top:0;overflow-x:auto;border-bottom:1px solid var(--border)}
.tabs::-webkit-scrollbar{height:2px}
.tabs::-webkit-scrollbar-thumb{background:var(--dim)}
.tab{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;padding:16px 20px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* BOARD */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;padding:2.5rem;flex:1;align-content:start;background:transparent}
@media(max-width:700px){.board{grid-template-columns:1fr;padding:1.25rem}}

/* COLUMN */
.col{padding:0}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:12px;border-bottom:1px solid var(--border)}
.col-title{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase}
.col-title.todo{color:var(--todo)}
.col-title.working{color:var(--working)}
.col-title.done{color:var(--done-text)}
.col-count{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:400;color:var(--muted)}

/* TASK CARD */
.task{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:13px 15px;margin-bottom:7px;cursor:pointer;transition:border-color .15s,transform .1s}
.task:hover{border-color:var(--dim);transform:translateY(-1px)}
.task:active{transform:translateY(0)}
.task.done-task{opacity:0.45}
.task-title{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:400;line-height:1.45;color:var(--text);margin-bottom:7px}
.task-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-date{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:10px;font-weight:400;color:var(--muted)}
.task-links{font-size:10px;color:var(--muted);display:flex;gap:5px}
.task-link-badge{background:var(--dim);border-radius:2px;padding:1px 5px;font-size:9px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted)}
.priority{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.p-high{background:#e84040}
.p-med{background:var(--accent)}
.p-low{background:#333}

/* ADD TASK */
.add-task{display:flex;align-items:center;gap:8px;padding:10px 0 4px;cursor:pointer;color:var(--muted);font-size:11px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;transition:color .15s;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
.add-task:hover{color:var(--accent)}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--dim);border-radius:8px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:2rem;position:relative;transform:translateY(14px);transition:transform .2s}
.overlay.open .modal{transform:translateY(0)}
.modal-close{position:absolute;top:18px;right:20px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;transition:color .15s}
.modal-close:hover{color:var(--text)}
.modal-title{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:18px;font-weight:700;letter-spacing:-0.01em;margin-bottom:1.5rem;color:var(--text)}

/* FORM */
label{display:block;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:18px}
label:first-of-type{margin-top:0}
input[type=text],input[type=date],input[type=url],select,textarea{width:100%;background:var(--bg);border:1px solid var(--dim);border-radius:4px;color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;padding:10px 12px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--surface)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-row{display:flex;gap:10px;margin-top:1.75rem}
.btn-primary{flex:1;padding:11px;background:var(--accent);color:#080808;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;border:none;border-radius:4px;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:0.88}
.btn-ghost{padding:11px 16px;background:transparent;border:1px solid var(--dim);color:var(--muted);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:12px;font-weight:500;border-radius:4px;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.btn-danger{padding:11px 16px;background:transparent;border:1px solid #3a1a1a;color:#e84040;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:12px;font-weight:500;border-radius:4px;cursor:pointer;transition:all .15s}
.btn-danger:hover{background:#e84040;color:#fff;border-color:#e84040}

/* LINKS SECTION */
.links-section{margin-top:18px}
.link-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.link-type{width:110px;flex-shrink:0}
.link-url{flex:1}
.link-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px;transition:color .15s;line-height:1}
.link-remove:hover{color:#e84040}
.add-link-btn{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:500;color:var(--muted);background:none;border:1px dashed var(--dim);border-radius:4px;padding:8px 12px;cursor:pointer;width:100%;text-align:left;transition:all .15s;margin-top:4px;letter-spacing:0.04em}
.add-link-btn:hover{border-color:var(--accent);color:var(--accent)}

/* AI CHAT PANEL */
.chat-fab{position:fixed;bottom:1.75rem;right:1.75rem;background:var(--accent);color:#080808;border:none;border-radius:50%;width:52px;height:52px;font-size:20px;cursor:pointer;z-index:90;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.5);transition:transform .15s}
.chat-fab:hover{transform:scale(1.07)}
.chat-panel{position:fixed;bottom:0;right:0;width:380px;height:520px;background:var(--surface);border:1px solid var(--dim);border-bottom:none;border-right:none;border-radius:12px 0 0 0;z-index:95;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 40px rgba(0,0,0,0.5)}
.chat-panel.open{transform:translateY(0)}
@media(max-width:500px){.chat-panel{width:100%;border-radius:12px 12px 0 0;border-left:1px solid var(--dim);border-right:1px solid var(--dim)}}
.chat-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-header-title{font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent)}
.chat-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;transition:color .15s}
.chat-close:hover{color:var(--text)}
.chat-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--dim)}
.msg{max-width:88%;font-size:12.5px;line-height:1.5;padding:9px 12px;border-radius:6px}
.msg.user{background:var(--accent);color:#080808;font-weight:500;align-self:flex-end;border-radius:6px 6px 2px 6px}
.msg.assistant{background:var(--card);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-radius:6px 6px 6px 2px}
.msg.system{color:var(--muted);font-size:11px;text-align:center;align-self:center;background:none;border:none;padding:2px 0}
.chat-input-row{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.chat-input{flex:1;background:var(--bg);border:1px solid var(--dim);border-radius:4px;color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:12.5px;padding:9px 12px;outline:none;transition:border-color .15s;resize:none;height:38px}
.chat-input:focus{border-color:var(--accent)}
.chat-send{background:var(--accent);color:#080808;border:none;border-radius:4px;padding:0 14px;cursor:pointer;font-weight:700;font-size:14px;transition:opacity .15s}
.chat-send:hover{opacity:0.88}
.chat-send:disabled{opacity:0.4;cursor:not-allowed}

/* EMPTY */
.empty{padding:1.25rem 0;color:var(--muted);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}

/* TOAST */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--dim);color:var(--text);font-size:11px;font-weight:500;letter-spacing:0.06em;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;padding:10px 18px;border-radius:4px;z-index:200;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAf//Z" alt="Souled Out Music Group">
    </div>
    <div class="header-right">
      <button class="add-artist-btn" onclick="openAddArtist()">+ Artist</button>
    </div>
  </header>

  <div class="tabs" id="tabs" style="margin-top:1.75rem"></div>
  <div class="board" id="board" style="padding-top:2rem"></div>
</div>

<!-- TASK MODAL -->
<div class="overlay" id="taskOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">New Task</div>

    <label>Task Title</label>
    <input type="text" id="taskInput" placeholder="What needs to get done?">

    <div class="row" style="margin-top:18px">
      <div>
        <label style="margin-top:0">Status</label>
        <select id="statusSelect">
          <option value="todo">To Do</option>
          <option value="working">Working On</option>
          <option value="done">Completed</option>
        </select>
      </div>
      <div>
        <label style="margin-top:0">Priority</label>
        <select id="prioritySelect">
          <option value="low">Low</option>
          <option value="med">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
    </div>

    <label>Due Date</label>
    <input type="date" id="dueDateInput">

    <label>Notes / Details</label>
    <textarea id="notesInput" placeholder="Context, links, references..."></textarea>

    <div class="links-section">
      <label style="margin-top:0">Linked Files</label>
      <div id="linksContainer"></div>
      <button class="add-link-btn" onclick="addLinkRow()">+ Add Google Doc / Sheet / Dropbox link</button>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="saveTask()">Save</button>
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-danger" id="deleteBtn" style="display:none" onclick="deleteTask()">Delete</button>
    </div>
  </div>
</div>

<!-- ADD ARTIST MODAL -->
<div class="overlay" id="artistOverlay" onclick="if(event.target===this)closeArtistModal()">
  <div class="modal" style="max-width:400px">
    <button class="modal-close" onclick="closeArtistModal()">✕</button>
    <div class="modal-title">Add Artist</div>
    <label>Artist Name</label>
    <input type="text" id="artistInput" placeholder="Artist name">
    <div class="btn-row">
      <button class="btn-primary" onclick="saveArtist()">Add</button>
      <button class="btn-ghost" onclick="closeArtistModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- AI CHAT -->
<button class="chat-fab" onclick="toggleChat()" title="Update board with Claude">✦</button>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <span class="chat-header-title">Update with Claude</span>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="msg system">Tell me what to add, move, or update on the board.</div>
  </div>
  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" placeholder="e.g. Add a task for Alex..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}">
    <button class="chat-send" id="chatSend" onclick="sendChat()">↑</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const DEFAULT_ARTISTS = ['Alex Ponce','Sickick','Jeanette','EP','Johnny Carter'];

function getState() {
  try {
    const raw = localStorage.getItem('somg_v3');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { artists: DEFAULT_ARTISTS, activeArtist: DEFAULT_ARTISTS[0], tasks: {"Alex Ponce":[{"id":"task_001","title":"Finalize Huella concept","status":"todo","priority":"high","dueDate":"","notes":"","links":[]},{"id":"task_002","title":"Finalize Huella timeline","status":"todo","priority":"high","dueDate":"","notes":"","links":[]},{"id":"task_003","title":"Finalize double single release dates (Gloria, Tisan)","status":"todo","priority":"high","dueDate":"","notes":"","links":[]},{"id":"task_004","title":"Huella strategy","status":"todo","priority":"high","dueDate":"","notes":"","links":[]},{"id":"task_005","title":"Build email to influence/media — full Alex project brief (timeline, demos, creative, social, marketing, content editing, strategy, rebranding guide)","status":"todo","priority":"med","dueDate":"","notes":"","links":[]},{"id":"task_006","title":"Put together team list for Alex Ponce — external vendors + creative directors","status":"todo","priority":"med","dueDate":"","notes":"","links":[]},{"id":"task_007","title":"Alex Ponce social handle — secure new handle","status":"todo","priority":"med","dueDate":"","notes":"","links":[]},{"id":"task_008","title":"FIFA Philly Fan Fest","status":"todo","priority":"med","dueDate":"","notes":"","links":[]}]} };
}
function saveState(state) { localStorage.setItem('somg_v3', JSON.stringify(state)); }

let state = getState();
let editingTaskId = null;
let chatHistory = [];

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() { renderTabs(); renderBoard(); }

function renderTabs() {
  document.getElementById('tabs').innerHTML = state.artists.map(a => `
    <button class="tab ${a===state.activeArtist?'active':''}" onclick="setArtist(${JSON.stringify(a)})">${escHtml(a)}</button>
  `).join('');
}

function renderBoard() {
  const tasks = (state.tasks[state.activeArtist] || []);
  const cols = [
    { key:'todo',    label:'TO DO',       cls:'todo'    },
    { key:'working', label:'WORKING ON',  cls:'working' },
    { key:'done',    label:'COMPLETED',   cls:'done'    }
  ];
  document.getElementById('board').innerHTML = cols.map(col => {
    const ct = tasks.filter(t => t.status === col.key);
    return `<div class="col">
      <div class="col-header">
        <span class="col-title ${col.cls}">${col.label}</span>
        <span class="col-count">${ct.length}</span>
      </div>
      <div>
        ${ct.length===0?'<div class="empty">Empty</div>':''}
        ${ct.map(t => taskCard(t)).join('')}
      </div>
      <div class="add-task" onclick="openNewTask('${col.key}')"><span style="font-size:14px;margin-right:2px">+</span> Add Task</div>
    </div>`;
  }).join('');
}

function taskCard(t) {
  const pc = {high:'p-high',med:'p-med',low:'p-low'}[t.priority]||'p-low';
  const date = t.dueDate ? `<span class="task-date">${formatDate(t.dueDate)}</span>` : '';
  const links = (t.links||[]).filter(l=>l.url);
  const badges = links.map(l=>`<span class="task-link-badge">${escHtml(l.type)}</span>`).join('');
  return `<div class="task ${t.status==='done'?'done-task':''}" onclick="openEditTask(${JSON.stringify(t.id)})">
    <div class="task-title">${escHtml(t.title)}</div>
    <div class="task-meta">
      <div class="priority ${pc}"></div>
      ${date}
      ${badges?`<div class="task-links">${badges}</div>`:''}
    </div>
  </div>`;
}

// ─── ARTIST ───────────────────────────────────────────────────────────────────
function setArtist(name) { state.activeArtist=name; saveState(state); render(); }
function openAddArtist() {
  document.getElementById('artistInput').value='';
  document.getElementById('artistOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('artistInput').focus(),100);
}
function closeArtistModal() { document.getElementById('artistOverlay').classList.remove('open'); }
function saveArtist() {
  const name = document.getElementById('artistInput').value.trim();
  if (!name) return;
  if (state.artists.includes(name)) { showToast('Artist already exists'); return; }
  state.artists.push(name); state.activeArtist=name;
  saveState(state); closeArtistModal(); render(); showToast(`${name} added`);
}

// ─── TASK MODAL ───────────────────────────────────────────────────────────────
let newTaskStatus = 'todo';

function openNewTask(status) {
  newTaskStatus = status||'todo';
  editingTaskId = null;
  document.getElementById('modalTitle').textContent = 'New Task';
  document.getElementById('taskInput').value = '';
  document.getElementById('statusSelect').value = newTaskStatus;
  document.getElementById('prioritySelect').value = 'med';
  document.getElementById('dueDateInput').value = '';
  document.getElementById('notesInput').value = '';
  document.getElementById('deleteBtn').style.display = 'none';
  renderLinkRows([]);
  document.getElementById('taskOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('taskInput').focus(),100);
}

function openEditTask(id) {
  const tasks = state.tasks[state.activeArtist]||[];
  const task = tasks.find(t=>t.id===id);
  if (!task) return;
  editingTaskId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('taskInput').value = task.title;
  document.getElementById('statusSelect').value = task.status;
  document.getElementById('prioritySelect').value = task.priority||'med';
  document.getElementById('dueDateInput').value = task.dueDate||'';
  document.getElementById('notesInput').value = task.notes||'';
  document.getElementById('deleteBtn').style.display = '';
  renderLinkRows(task.links||[]);
  document.getElementById('taskOverlay').classList.add('open');
}

function closeModal() { document.getElementById('taskOverlay').classList.remove('open'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('taskOverlay'))closeModal(); }

function saveTask() {
  const title = document.getElementById('taskInput').value.trim();
  if (!title) { showToast('Task needs a title'); return; }
  const links = collectLinks();
  const task = {
    title,
    status: document.getElementById('statusSelect').value,
    priority: document.getElementById('prioritySelect').value,
    dueDate: document.getElementById('dueDateInput').value,
    notes: document.getElementById('notesInput').value.trim(),
    links
  };
  const artist = state.activeArtist;
  if (!state.tasks[artist]) state.tasks[artist] = [];
  if (editingTaskId) {
    const idx = state.tasks[artist].findIndex(t=>t.id===editingTaskId);
    if (idx>-1) state.tasks[artist][idx] = {...state.tasks[artist][idx],...task};
  } else {
    task.id = 'task_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    state.tasks[artist].push(task);
  }
  saveState(state); closeModal(); render();
  showToast(editingTaskId?'Task updated':'Task added');
}

function deleteTask() {
  if (!editingTaskId) return;
  const artist = state.activeArtist;
  state.tasks[artist] = (state.tasks[artist]||[]).filter(t=>t.id!==editingTaskId);
  saveState(state); closeModal(); render(); showToast('Task deleted');
}

// ─── LINK ROWS ────────────────────────────────────────────────────────────────
function renderLinkRows(links) {
  const c = document.getElementById('linksContainer');
  c.innerHTML = '';
  (links.length?links:[]).forEach((l,i)=>appendLinkRow(l.type,l.url));
}

function appendLinkRow(type='Google Doc', url='') {
  const c = document.getElementById('linksContainer');
  const row = document.createElement('div');
  row.className='link-row';
  row.innerHTML=`
    <select class="link-type" style="font-size:12px;padding:8px 10px">
      <option${type==='Google Doc'?' selected':''}>Google Doc</option>
      <option${type==='Google Sheet'?' selected':''}>Google Sheet</option>
      <option${type==='Dropbox'?' selected':''}>Dropbox</option>
      <option${type==='Other'?' selected':''}>Other</option>
    </select>
    <input type="url" class="link-url" placeholder="Paste link here" value="${escAttr(url)}">
    <button class="link-remove" onclick="this.parentElement.remove()">✕</button>`;
  c.appendChild(row);
}

function addLinkRow() { appendLinkRow(); }

function collectLinks() {
  return [...document.querySelectorAll('.link-row')].map(row=>({
    type: row.querySelector('.link-type').value,
    url: row.querySelector('.link-url').value.trim()
  })).filter(l=>l.url);
}

// ─── AI CHAT ──────────────────────────────────────────────────────────────────
function toggleChat() {
  document.getElementById('chatPanel').classList.toggle('open');
}

function addChatMsg(role, text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('chatSend');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  btn.disabled = true;
  addChatMsg('user', text);

  // Build context
  const boardContext = JSON.stringify({
    artists: state.artists,
    activeArtist: state.activeArtist,
    tasks: state.tasks
  });

  const systemPrompt = `You are a board assistant for Souled Out Music Group (SOMG). You help manage a task board for music artists.

The current board state is:
${boardContext}

When the user asks you to add, move, update, or delete tasks — respond with a JSON action block followed by a friendly confirmation message.

JSON format (put it first, wrapped in triple backticks json):
\`\`\`json
{
  "action": "add_task" | "update_task" | "delete_task" | "move_task",
  "artist": "Artist Name",
  "task": {
    "id": "existing_id_if_updating_or_deleting",
    "title": "Task title",
    "status": "todo" | "working" | "done",
    "priority": "low" | "med" | "high",
    "dueDate": "YYYY-MM-DD or empty string",
    "notes": "any notes",
    "links": []
  }
}
\`\`\`

If the user is just asking a question (not making changes), respond conversationally without JSON.
Always be concise. Refer to artists by their first name where natural.`;

  chatHistory.push({ role: 'user', content: text });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: chatHistory
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Something went wrong.';
    chatHistory.push({ role: 'assistant', content: reply });

    // Parse JSON action if present
    const jsonMatch = reply.match(/```json\s*([\s\S]*?)```/);
    if (jsonMatch) {
      try {
        const action = JSON.parse(jsonMatch[1]);
        applyAction(action);
        const humanReply = reply.replace(/```json[\s\S]*?```/, '').trim();
        if (humanReply) addChatMsg('assistant', humanReply);
        else addChatMsg('assistant', 'Done — board updated.');
      } catch(e) {
        addChatMsg('assistant', reply);
      }
    } else {
      addChatMsg('assistant', reply);
    }
  } catch(e) {
    addChatMsg('assistant', 'Connection error. Try again.');
  }

  btn.disabled = false;
}

function applyAction(action) {
  const artist = action.artist || state.activeArtist;
  if (!state.tasks[artist]) state.tasks[artist] = [];

  if (action.action === 'add_task') {
    const task = { ...action.task };
    task.id = 'task_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    task.links = task.links || [];
    state.tasks[artist].push(task);
    showToast('Task added via chat');
  } else if (action.action === 'update_task' || action.action === 'move_task') {
    const idx = state.tasks[artist].findIndex(t=>t.id===action.task.id);
    if (idx>-1) { state.tasks[artist][idx] = {...state.tasks[artist][idx], ...action.task}; showToast('Task updated'); }
  } else if (action.action === 'delete_task') {
    state.tasks[artist] = state.tasks[artist].filter(t=>t.id!==action.task.id);
    showToast('Task deleted');
  }

  saveState(state);
  render();
}

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeModal(); closeArtistModal(); }
  if (e.key==='Enter' && document.getElementById('taskOverlay').classList.contains('open')) {
    if (e.target.tagName!=='TEXTAREA') { e.preventDefault(); saveTask(); }
  }
  if (e.key==='Enter' && document.getElementById('artistOverlay').classList.contains('open')) {
    e.preventDefault(); saveArtist();
  }
});

// ─── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s||'').replace(/"/g,'&quot;'); }
function formatDate(d){
  if(!d)return '';
  const [y,m,day]=d.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]+' '+parseInt(day);
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

render();
</script>
